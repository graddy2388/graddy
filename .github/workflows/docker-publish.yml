name: Build and publish Docker image

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner environment
        run: |
          echo "=== OS ==="
          uname -a
          echo "=== User ==="
          whoami
          echo "=== Docker version ==="
          docker --version
          echo "=== Docker info ==="
          docker info 2>&1 | head -30
          echo "=== Workspace files ==="
          ls -la
          echo "=== GITHUB_TOKEN length ==="
          echo "${{ secrets.GITHUB_TOKEN }}" | wc -c

      - name: Log in to GHCR
        run: |
          echo "Logging in as: ${{ github.actor }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "Login exit code: $?"

      - name: Build Docker image
        run: |
          echo "Starting docker build..."
          docker build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            .
          echo "Build exit code: $?"

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
