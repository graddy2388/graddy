services:

  # One-shot init: fixes volume ownership before the app starts.
  # Docker named volumes mount as root:root on first creation, which prevents
  # the non-root viridis user (uid 1001) from writing the SQLite database.
  init-perms:
    image: busybox
    volumes:
      - viridis-data:/app/data
      - viridis-logs:/app/logs
    command: ["sh", "-c", "chown -R 1001:1001 /app/data /app/logs"]
    restart: "no"

  viridis:
    image: ghcr.io/graddy2388/graddy:latest
    depends_on:
      init-perms:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - viridis-data:/app/data      # SQLite database and scan history
      - viridis-logs:/app/logs      # Log files
      - ./config:/app/config       # Your targets.yaml and config overrides
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  viridis-data:
  viridis-logs:
