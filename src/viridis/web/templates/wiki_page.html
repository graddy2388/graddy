{% extends "base.html" %}
{% block title %}{{ wiki_title }} – Wiki – Viridis{% endblock %}

{% block content %}
<div class="p-6 max-w-4xl">
  <div class="mb-6">
    <a href="/wiki" class="text-xs text-emerald-500 hover:text-emerald-400 font-medium">← All wiki pages</a>
    <h1 class="text-xl font-bold text-white mt-2">{{ wiki_title }}</h1>
  </div>

  <article class="wiki-body rounded-xl border border-gray-800 bg-gray-900/50 p-6 text-gray-300 text-sm leading-relaxed">
    {{ content_html | safe }}
  </article>
</div>

<style>
  .wiki-body h1 { font-size: 1.5rem; font-weight: 700; color: #f9fafb; margin: 1.25rem 0 0.75rem; }
  .wiki-body h2 { font-size: 1.15rem; font-weight: 600; color: #e5e7eb; margin: 1.5rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid #1f2937; }
  .wiki-body h3 { font-size: 1rem; font-weight: 600; color: #d1d5db; margin: 1rem 0 0.35rem; }
  .wiki-body h4 { font-size: 0.95rem; font-weight: 600; color: #9ca3af; margin: 0.75rem 0 0.25rem; }
  .wiki-body p { margin: 0.5rem 0; }
  .wiki-body a { color: #34d399; text-decoration: underline; text-underline-offset: 2px; }
  .wiki-body a:hover { color: #6ee7b7; }
  .wiki-body ul, .wiki-body ol { margin: 0.5rem 0 0.5rem 1.25rem; }
  .wiki-body li { margin: 0.25rem 0; }
  .wiki-body hr { border: 0; border-top: 1px solid #374151; margin: 1.25rem 0; }
  .wiki-body blockquote { border-left: 3px solid #065f46; margin: 0.75rem 0; padding-left: 1rem; color: #9ca3af; }
  .wiki-body code { font-size: 0.85em; background: #111827; padding: 0.1rem 0.35rem; border-radius: 0.25rem; color: #a7f3d0; }
  .wiki-body pre { background: #030712; border: 1px solid #1f2937; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; }
  .wiki-body pre code { background: transparent; padding: 0; color: #d1d5db; }
  .wiki-body table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.85rem; }
  .wiki-body th, .wiki-body td { border: 1px solid #374151; padding: 0.4rem 0.6rem; text-align: left; }
  .wiki-body th { background: #111827; color: #9ca3af; font-weight: 600; }
  .wiki-body .headerlink { margin-left: 0.35rem; opacity: 0.35; text-decoration: none; font-weight: 400; }
  .wiki-body .headerlink:hover { opacity: 1; }
  .wiki-body .toc { background: #111827; border: 1px solid #1f2937; border-radius: 0.5rem; padding: 0.75rem 1rem; margin: 0 0 1rem; font-size: 0.85rem; }
  .wiki-body .toc ul { list-style: none; margin: 0.35rem 0 0 0.5rem; padding: 0; }
  .wiki-body .toc > ul { margin-top: 0; }
</style>
{% endblock %}
