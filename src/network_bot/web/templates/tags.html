{% extends "base.html" %}
{% block title %}Tags – Viridis{% endblock %}

{% block content %}
<div class="p-6 space-y-6" x-data="tagsApp()">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Tags</h1>
      <p class="text-sm text-gray-500 mt-0.5">Classify and filter targets by tag</p>
    </div>
    <button @click="showNew = true"
            class="flex items-center space-x-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      <span>New Tag</span>
    </button>
  </div>

  <!-- New Tag Modal -->
  <div x-show="showNew" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70">
    <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-sm mx-4 p-6">
      <h3 class="text-sm font-semibold text-white mb-4">Create Tag</h3>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Name</label>
          <input x-model="newName" type="text" placeholder="e.g. windows, web-server"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500"/>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Color</label>
          <input x-model="newColor" type="color" value="#10b981"
                 class="h-9 w-full rounded-lg bg-gray-800 border border-gray-700 cursor-pointer px-1"/>
        </div>
      </div>
      <div class="flex justify-end space-x-3 mt-5">
        <button @click="showNew = false"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg text-sm transition-colors">Cancel</button>
        <button @click="createTag()"
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors">Create</button>
      </div>
    </div>
  </div>

  <!-- Tag grid -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
    {% for tag in tags %}
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex items-center justify-between group">
      <div class="flex items-center space-x-3 min-w-0">
        <span class="w-3 h-3 rounded-full flex-shrink-0" style="background:{{ tag.color or '#10b981' }}"></span>
        <span class="text-sm text-white truncate">{{ tag.name }}</span>
      </div>
      <button onclick="deleteTag({{ tag.id }})"
              class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 transition-all ml-2 flex-shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    {% else %}
    <div class="col-span-full py-12 text-center">
      <p class="text-gray-600 text-sm">No tags yet.</p>
    </div>
    {% endfor %}
  </div>

</div>

<script>
function tagsApp() {
  return {
    showNew: false,
    newName: '',
    newColor: '#10b981',
    createTag() {
      if (!this.newName.trim()) return;
      fetch('/api/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: this.newName.trim(), color: this.newColor }),
      }).then(() => location.reload());
    },
  };
}
function deleteTag(id) {
  if (!confirm('Delete this tag?')) return;
  fetch(`/api/tags/${id}`, { method: 'DELETE' }).then(() => location.reload());
}
</script>
{% endblock %}
