{% extends "base.html" %}
{% block title %}Groups – Viridis{% endblock %}

{% block content %}
<div class="p-6 space-y-5" x-data="groupsApp()">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Groups</h1>
      <p class="text-sm text-gray-500 mt-0.5">Organize targets into groups for batch scanning and scheduling</p>
    </div>
    <button @click="openAdd()"
            class="flex items-center space-x-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      <span>Add Group</span>
    </button>
  </div>

  <!-- Add / Edit Modal -->
  <div x-show="showModal" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70"
       @click.self="showModal = false">
    <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-md mx-4">
      <div class="px-5 py-4 border-b border-gray-700 flex items-center justify-between">
        <h3 class="text-sm font-semibold text-white" x-text="editGroup ? 'Edit Group' : 'Add Group'"></h3>
        <button @click="showModal = false" class="text-gray-500 hover:text-gray-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="px-5 py-4 space-y-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Name *</label>
          <input x-model="form.name" type="text" placeholder="e.g. Production, DMZ, Internal"
                 @keydown.enter="saveGroup()"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500"/>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Description</label>
          <textarea x-model="form.description" rows="2"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500"></textarea>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-2">Color</label>
          <div class="flex flex-wrap gap-2">
            <template x-for="c in presetColors" :key="c">
              <button type="button" @click="form.color = c"
                      :class="form.color === c ? 'ring-2 ring-white ring-offset-2 ring-offset-gray-900 scale-110' : ''"
                      class="w-7 h-7 rounded-full transition-all" :style="'background-color:' + c"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="px-5 py-4 border-t border-gray-700 flex justify-end space-x-3">
        <button @click="showModal = false"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg text-sm transition-colors">Cancel</button>
        <button @click="saveGroup()"
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors">Save</button>
      </div>
    </div>
  </div>

  <!-- Groups grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <template x-for="g in groups" :key="g.id">
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden hover:border-gray-700 transition-colors">
        <!-- Color stripe -->
        <div class="h-1" :style="'background-color:' + g.color"></div>
        <div class="p-4">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-white text-sm truncate" x-text="g.name"></h3>
              <p class="text-xs text-gray-500 mt-0.5 truncate" x-text="g.description || 'No description'"></p>
            </div>
            <div class="flex items-center space-x-0.5 ml-3 flex-shrink-0">
              <button @click="openEdit(g)" class="p-1.5 text-gray-500 hover:text-gray-300 hover:bg-gray-800 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
              <button @click="deleteGroup(g.id)" class="p-1.5 text-gray-500 hover:text-red-400 hover:bg-red-950 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-800">
            <span class="text-xs text-gray-500">
              <span x-text="g.target_count || 0" class="font-medium text-gray-300"></span> target(s)
            </span>
            <button @click="window.startScan({ group_id: g.id })"
                    class="flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-white transition-opacity hover:opacity-80"
                    :style="'background-color:' + g.color">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Scan Group</span>
            </button>
          </div>
        </div>
      </div>
    </template>

    <div x-show="groups.length === 0"
         class="col-span-full bg-gray-900 border border-gray-800 rounded-xl py-16 text-center">
      <p class="text-gray-600 text-sm">No groups yet. Click <strong class="text-gray-400">Add Group</strong> to create one.</p>
    </div>
  </div>

</div>

<script>
function groupsApp() {
  return {
    groups: {{ groups | tojson }},
    showModal: false,
    editGroup: null,
    form: { name: '', description: '', color: '#4b5563' },
    presetColors: ['#4b5563','#6366f1','#3b82f6','#10b981','#f59e0b','#f97316','#ef4444','#ec4899','#0891b2','#7c3aed'],

    openAdd() {
      this.form = { name: '', description: '', color: '#4b5563' };
      this.editGroup = null;
      this.showModal = true;
    },
    openEdit(g) {
      this.form = { name: g.name, description: g.description || '', color: g.color || '#4b5563' };
      this.editGroup = g;
      this.showModal = true;
    },

    async saveGroup() {
      if (!this.form.name.trim()) return;
      const url    = this.editGroup ? `/api/groups/${this.editGroup.id}` : '/api/groups';
      const method = this.editGroup ? 'PUT' : 'POST';
      const r = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.form),
      });
      if (r.ok) {
        location.reload();
      } else {
        const e = await r.json().catch(() => ({}));
        alert(e.detail || 'Save failed');
      }
    },

    async deleteGroup(id) {
      if (!confirm('Delete this group? Targets will be unassigned.')) return;
      await fetch(`/api/groups/${id}`, { method: 'DELETE' });
      location.reload();
    },
  };
}
</script>
{% endblock %}
